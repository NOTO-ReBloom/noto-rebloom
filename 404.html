<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#11121a">
  <title>第四の寝室へ戻る</title>
  <style>
    :root{color-scheme:dark}body{margin:0;min-height:100vh;display:grid;place-items:center;background:#11121a;color:#eee5d5;font-family:system-ui,-apple-system,"Hiragino Sans","Yu Gothic",sans-serif}.box{max-width:34rem;padding:2rem;text-align:center}a{display:inline-block;margin-top:1rem;padding:.8rem 1.2rem;border:1px solid #d8a43f;border-radius:999px;color:#f1d58b;text-decoration:none}
  </style>
</head>
<body>
  <main class="box">
    <h1>ページが見つかりません</h1>
    <p>ゲームの入口へ戻ります。</p>
    <a id="home" href="./">『第四の寝室』を開く</a>
  </main>
  <script>
    const parts = location.pathname.split('/').filter(Boolean);
    const isGitHubProjectPage = location.hostname.endsWith('.github.io') && parts.length >= 1;
    const base = isGitHubProjectPage ? `/${parts[0]}/` : '/';
    document.getElementById('home').href = base;
  </script>
</body>
</html>
